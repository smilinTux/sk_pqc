name: sk_pqc
description: >-
  Hybrid post-quantum key encapsulation (X25519 + ML-KEM-768, FIPS 203) for
  Dart and Flutter across web and native. Binds audited primitives (liboqs,
  noble-post-quantum) with a standard HKDF-SHA256 hybrid combiner. KEM-only.
version: 0.1.0
repository: https://github.com/smilinTux/sk_pqc
issue_tracker: https://github.com/smilinTux/sk_pqc/issues
topics:
  - cryptography
  - post-quantum
  - kem
  - ml-kem
  - security

environment:
  sdk: ^3.5.0

dependencies:
  cryptography: ^2.7.0
  ffi: ^2.1.0
  web: ^1.0.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
